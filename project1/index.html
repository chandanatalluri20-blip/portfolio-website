<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Calculator</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: white;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .container {
      text-align: center;
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.8rem;
      font-weight: 400; /* not bold */
      text-transform: capitalize; /* Capital first letter */
    }

    .calculator {
      background: rgba(34, 34, 34, 0.95);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      width: 320px;
    }

    #display {
      width: 100%;
      height: 60px;
      font-size: 28px;
      text-align: right;
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: #f9f9f9;
      box-shadow: inset 2px 2px 6px rgba(0,0,0,0.2);
      box-sizing: border-box; /* prevents overflow */
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      height: 70px;
      font-size: 22px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      background: #333;
      color: #fff;
      box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
      transition: transform 0.1s ease, background 0.2s ease;
    }

    button:hover {
      background: #444;
      transform: scale(1.05);
    }

    .operator {
      background: #ff9500; /* yellow-orange for all operators */
    }

    .operator:hover {
      background: #e08900;
    }

    .equal {
      grid-column: span 2;
      background: #28a745;
    }

    .equal:hover {
      background: #218838;
    }

    .clear {
      background: #dc3545;
    }

    .clear:hover {
      background: #c82333;
    }

    .backspace {
      background: #17a2b8;
    }

    .backspace:hover {
      background: #117a8b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Simple calculator</h1>
    <div class="calculator">
      <input type="text" id="display" disabled>
      <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="backspace" onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="append('/')">÷</button>
        <button class="operator" onclick="append('*')">×</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('-')">−</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('.')">.</button>

        <button onclick="append('0')" style="grid-column: span 2;">0</button>
        <button class="equal" onclick="calculate()">=</button>
      </div>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");

    function append(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = "";
    }

    function deleteLast() {
      display.value = display.value.slice(0, -1);
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = "Error";
      }
    }

    // Keyboard support
    document.addEventListener("keydown", (event) => {
      const key = event.key;

      if (!isNaN(key) || "+-*/.".includes(key)) {
        append(key);
      } else if (key === "Enter") {
        calculate();
      } else if (key === "Backspace") {
        deleteLast();
      } else if (key.toLowerCase() === "c") {
        clearDisplay();
      }
    });
  </script>
</body>
</html>
